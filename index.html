<!-- index.html ka wo hissa jahan Thumbnail Downloader function hai -->
<script>
    function fetchThumbnails() {
        let url = document.getElementById('yt-url').value;
        let videoId = "";
        if (url.includes("v=")) { videoId = url.split("v=")[1].split("&")[0]; }
        else if (url.includes("youtu.be/")) { videoId = url.split("youtu.be/")[1].split("?")[0]; }

        if (videoId) {
            let sizes = [
                { title: "HD (1280x720)", url: `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg` },
                { title: "SD (640x480)", url: `https://img.youtube.com/vi/${videoId}/sddefault.jpg` },
                { title: "Medium (320x180)", url: `https://img.youtube.com/vi/${videoId}/mqdefault.jpg` },
                { title: "Small (120x90)", url: `https://img.youtube.com/vi/${videoId}/default.jpg` }
            ];
            
            let htmlContent = "";
            sizes.forEach(size => {
                // Direct download link
                htmlContent += `
                    <div class="col-md-3 text-center mb-3">
                        <img src="${size.url}" class="img-fluid border mb-2">
                        <a href="${size.url}" target="_blank" download class="btn btn-success btn-sm w-100">${size.title}</a>
                    </div>`;
            });
            document.getElementById('thumb-results').innerHTML = htmlContent;
        } else {
            alert("Invalid URL!");
        }
    }
</script>
